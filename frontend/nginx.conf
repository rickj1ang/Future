# ════════════════════════════════════════════════════
# frontend nginx 配置
# - /chat /elicit /health → proxy 到 core-agent:8081
# - 其它路径 → 静态文件
# - SSE 必须关闭 proxy_buffering，否则流式消息会被缓存
# ════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 反向代理到 core-agent ─────────────────────
    location /chat {
        proxy_pass http://core-agent:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE 关键：关闭缓冲，立即推送
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 长连接超时
    }

    location /elicit {
        proxy_pass http://core-agent:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://core-agent:8081;
    }

    # ── 静态文件 + SPA fallback ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
