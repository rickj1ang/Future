<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{.Code}} K线</title>
<style>
  html,body{margin:0;height:100%;background:#fff;font-family:system-ui,sans-serif}
  #chart{position:absolute;left:0;right:0;top:0;bottom:0}
  .err{padding:16px;color:#c00}
</style>
</head>
<body>
<div id="chart"></div>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
(function () {
  var el = document.getElementById('chart');
  if (!window.LightweightCharts) { el.innerHTML = '<div class="err">图表库加载失败（需要联网访问 CDN）</div>'; return; }
  var chart = LightweightCharts.createChart(el, {
    autoSize: true,
    layout: { background: { type: 'solid', color: '#fff' }, textColor: '#333' },
    grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
    timeScale: { timeVisible: true, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    localization: { locale: 'zh-CN' }
  });

  // 主图：蜡烛。A 股配色——红涨绿跌。
  var candle = chart.addCandlestickSeries({
    upColor: '#e55151', downColor: '#249954',
    borderUpColor: '#e55151', borderDownColor: '#249954',
    wickUpColor: '#e55151', wickDownColor: '#249954'
  });
  candle.setData({{.Candles}});

  // 副图：成交量柱，挂在主图下方 20% 高度。
  var volume = chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol'
  });
  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 }
  });
  volume.setData({{.Volume}});

  // 默认显示最近全部，留一点右侧空间。
  chart.timeScale().fitContent();
})();
</script>
</body>
</html>
