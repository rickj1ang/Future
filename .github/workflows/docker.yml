# ════════════════════════════════════════════════════
# Future 镜像：构建 → 发布 GHCR → 自动部署到服务器
#
# 触发：
#   - 推送 main 且改动 frontend/** / backend/**
#   - 打 tag v* （额外打语义化版本标签）
#   - Actions 页面手动运行 (workflow_dispatch)
#
# 镜像（ghcr.io/rickj1ang/）:
#   future-mcp-server   / future-core-agent   / future-frontend
# 标签: latest / 分支名 / commit 短 sha / git tag
# 架构: linux/amd64 + linux/arm64
#
# 部署: build-all 完成后，deploy job 用 SSH 登服务器执行
#       docker compose pull && up -d（见 compose.prod.yml）
# ════════════════════════════════════════════════════

name: Build, Publish & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: future-mcp-server
            context: backend/mcp-server
          - image: future-core-agent
            context: backend/core-agent
          - image: future-frontend
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

# 只构建 linux/amd64：避免 QEMU 模拟 Node/V8 时的 SIGILL 崩溃。
# 后端 Go 镜像虽能在 arm64 构建成功，但服务器是 amd64，无需双架构。
# 将来换 ARM 服务器再启用 QEMU + linux/arm64。
# - name: Set up QEMU
#   uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ── 部署：等三个镜像都构建完，SSH 登服务器拉新镜像并重启 ──
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # 只部署 main 分支
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 先把 compose 文件 scp 到服务器（保证服务器上永远是最新版）
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.prod.yml"
          target: "/opt/future"

      # 再 SSH 执行部署命令
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/future

            echo "▶ 拉取最新镜像..."
            docker compose -f compose.prod.yml pull

            echo "▶ 滚动更新..."
            docker compose -f compose.prod.yml up -d --remove-orphans

            echo "▶ 健康检查 core-agent..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8081/health >/dev/null 2>&1; then
                echo "✅ core-agent 健康"; exit 0
              fi
              sleep 2
            done
            echo "⚠️ core-agent 20s 内未就绪，请查 docker logs" >&2
            docker compose -f compose.prod.yml logs --tail=20 core-agent
            exit 1
